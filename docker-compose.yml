services:
  # --- THE BRAIN (Ollama) ---
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - aia_network

  # --- THE MEMORY (Qdrant) ---
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_data:/qdrant/storage
    networks:
      - aia_network

  # --- THE LOGIC (FastAPI Backend) ---
  backend:
    build: ./src/backend
    container_name: aia_backend
    environment:
      - QDRANT_HOST=qdrant
      - OLLAMA_HOST=http://ollama:11434
      - INTERNAL_API_KEY=system_secret_123  # Handshake key
    ports:
      - "8000:8000"
    depends_on:
      - qdrant
      - ollama
    networks:
      - aia_network

  # --- THE FACE (Streamlit Frontend) ---
  frontend:
    build: ./src/frontend
    container_name: aia_frontend
    env_file:
      - .env
    environment:
      - API_URL=http://backend:8000
      - INTERNAL_API_KEY=system_secret_123
    ports:
      - "8501:8501"
    depends_on:
      - backend
    networks:
      - aia_network

networks:
  aia_network:
    driver: bridge